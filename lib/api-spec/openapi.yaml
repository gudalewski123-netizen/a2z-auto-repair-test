openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CRM API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: auth
    description: Authentication
  - name: health
    description: Health operations
  - name: contacts
    description: Contact management
  - name: jobs
    description: Job / revenue tracking
  - name: activities
    description: Activity log
  - name: followups
    description: Follow-up reminders
  - name: dashboard
    description: Dashboard summaries
  - name: leads
    description: Public lead capture
  - name: site-changes
    description: Site customization requests
paths:
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "409":
          description: Email already exists

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List all contacts
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [new_lead, contacted, booked, completed, lost]
        - name: source
          in: query
          schema:
            type: string
            enum: [website, google_ads, facebook, referral, other]
        - name: search
          in: query
          schema:
            type: string
        - name: tag
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a new contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactBody"
      responses:
        "201":
          description: Created contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get a single contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Not found
    patch:
      operationId: updateContact
      tags: [contacts]
      summary: Update a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactBody"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Not found
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /contacts/{id}/status:
    patch:
      operationId: updateContactStatus
      tags: [contacts]
      summary: Change pipeline status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusBody"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{contactId}/jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs for a contact
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Add a job to a contact
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "201":
          description: Created job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /contacts/{contactId}/jobs/{id}:
    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobBody"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /contacts/{contactId}/activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List activity log for a contact
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activity log
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"

  /followups:
    get:
      operationId: listFollowUps
      tags: [followups]
      summary: List all follow-ups
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed]
        - name: overdue
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of follow-ups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FollowUp"

  /contacts/{contactId}/followups:
    post:
      operationId: createFollowUp
      tags: [followups]
      summary: Create a follow-up reminder
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFollowUpBody"
      responses:
        "201":
          description: Created follow-up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowUp"

  /followups/{id}:
    patch:
      operationId: updateFollowUp
      tags: [followups]
      summary: Update a follow-up
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFollowUpBody"
      responses:
        "200":
          description: Updated follow-up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowUp"
    delete:
      operationId: deleteFollowUp
      tags: [followups]
      summary: Delete a follow-up
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary counts and metrics
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/pipeline:
    get:
      operationId: getPipelineSummary
      tags: [dashboard]
      summary: Pipeline stage breakdown
      responses:
        "200":
          description: Pipeline breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineStage"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent activity feed across all contacts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Recent activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"

  /dashboard/source-breakdown:
    get:
      operationId: getSourceBreakdown
      tags: [dashboard]
      summary: Lead counts grouped by source
      responses:
        "200":
          description: Source breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourceCount"

  /leads:
    post:
      operationId: submitLead
      tags: [leads]
      summary: Public lead capture form submission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitLeadBody"
      responses:
        "201":
          description: Lead submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadSubmitResponse"

  /contacts/export:
    get:
      operationId: exportContacts
      tags: [contacts]
      summary: Export contacts as CSV
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /site-changes:
    post:
      operationId: submitSiteChange
      tags: [site-changes]
      summary: Submit a site customization request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitSiteChangeBody"
      responses:
        "201":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteChangeRequest"
    get:
      operationId: listSiteChanges
      tags: [site-changes]
      summary: List current user's site change requests
      responses:
        "200":
          description: List of requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SiteChangeRequest"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Contact:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        status:
          type: string
          enum: [new_lead, contacted, booked, completed, lost]
        source:
          type: string
          enum: [website, google_ads, facebook, referral, other]
        serviceRequested:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        totalRevenue:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - status
        - source
        - tags
        - totalRevenue
        - createdAt
        - updatedAt

    CreateContactBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        status:
          type: string
          enum: [new_lead, contacted, booked, completed, lost]
        source:
          type: string
          enum: [website, google_ads, facebook, referral, other]
        serviceRequested:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
      required:
        - name
        - phone

    UpdateContactBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        source:
          type: string
          enum: [website, google_ads, facebook, referral, other]
        serviceRequested:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string

    UpdateStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [new_lead, contacted, booked, completed, lost]
      required:
        - status

    Job:
      type: object
      properties:
        id:
          type: integer
        contactId:
          type: integer
        serviceType:
          type: string
        price:
          type: number
        date:
          type: ["string", "null"]
          format: date
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - contactId
        - serviceType
        - price
        - createdAt

    CreateJobBody:
      type: object
      properties:
        serviceType:
          type: string
        price:
          type: number
        date:
          type: ["string", "null"]
          format: date
        notes:
          type: ["string", "null"]
      required:
        - serviceType
        - price

    UpdateJobBody:
      type: object
      properties:
        serviceType:
          type: string
        price:
          type: number
        date:
          type: ["string", "null"]
          format: date
        notes:
          type: ["string", "null"]

    Activity:
      type: object
      properties:
        id:
          type: integer
        contactId:
          type: integer
        contactName:
          type: ["string", "null"]
        action:
          type: string
        details:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - contactId
        - action
        - createdAt

    FollowUp:
      type: object
      properties:
        id:
          type: integer
        contactId:
          type: integer
        contactName:
          type: ["string", "null"]
        dueDate:
          type: string
          format: date-time
        note:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, completed]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - contactId
        - dueDate
        - status
        - createdAt

    CreateFollowUpBody:
      type: object
      properties:
        dueDate:
          type: string
          format: date-time
        note:
          type: ["string", "null"]
      required:
        - dueDate

    UpdateFollowUpBody:
      type: object
      properties:
        dueDate:
          type: string
          format: date-time
        note:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, completed]

    DashboardSummary:
      type: object
      properties:
        totalLeads:
          type: integer
        bookedJobs:
          type: integer
        completedJobs:
          type: integer
        lostLeads:
          type: integer
        conversionRate:
          type: number
        totalRevenue:
          type: number
        overdueFollowUps:
          type: integer
      required:
        - totalLeads
        - bookedJobs
        - completedJobs
        - lostLeads
        - conversionRate
        - totalRevenue
        - overdueFollowUps

    PipelineStage:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
        revenue:
          type: number
      required:
        - status
        - count
        - revenue

    SourceCount:
      type: object
      properties:
        source:
          type: string
        count:
          type: integer
      required:
        - source
        - count

    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        businessName:
          type: string
      required:
        - email
        - password
        - businessName

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        businessName:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - businessName

    SubmitLeadBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        serviceRequested:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        source:
          type: string
          enum: [website, google_ads, facebook, referral, other]
      required:
        - name
        - phone

    LeadSubmitResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        contactId:
          type: integer
      required:
        - success
        - message
        - contactId

    SubmitSiteChangeBody:
      type: object
      properties:
        requestType:
          type: string
          enum: [structured, prompt]
        businessName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        aboutText:
          type: ["string", "null"]
        servicesText:
          type: ["string", "null"]
        photoNotes:
          type: ["string", "null"]
        pricingNotes:
          type: ["string", "null"]
        promptText:
          type: ["string", "null"]
      required:
        - requestType

    SiteChangeRequest:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        requestType:
          type: string
        businessName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        aboutText:
          type: ["string", "null"]
        servicesText:
          type: ["string", "null"]
        photoNotes:
          type: ["string", "null"]
        pricingNotes:
          type: ["string", "null"]
        promptText:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, in_progress, completed]
        adminNotes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - requestType
        - status
        - createdAt
