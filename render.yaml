# Render Blueprint — same idea as Tier 1's render.yaml, but for the full-CRM
# Tier 2 stack (contacts, jobs, activities, followups, leads pipeline).
#
# How to use:
#   1. Fork this repo on GitHub (rename to <client>).
#   2. Render dashboard → New Blueprint Instance → pick the forked repo.
#   3. Render reads this file and creates the service.
#   4. Fill in DATABASE_URL + ALLOWED_ORIGINS when prompted.
#   5. Save → live in ~3 min.
#
# IMPORTANT: rename `services[0].name` after forking (must be globally unique).

services:
  - type: web
    name: tier2-template-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    rootDir: .
    buildCommand: corepack enable && NODE_ENV=development pnpm install --no-frozen-lockfile && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: LEAD_NOTIFY_TO
        value: teddy.nk28@gmail.com
      # TextFlow lead-forwarding webhook (per-client). When set, every QuoteForm
      # submission is also POSTed here so TextFlow auto-sends an SMS outreach
      # to the lead. Get this URL from the client's TextFlow account dashboard;
      # it has the shape https://textflow-website.replit.app/api/public/leads/<key>.
      # Leave empty to disable TextFlow integration for this client.
      - key: TEXTFLOW_LEADS_WEBHOOK_URL
        sync: false
